name: Auto-update month in title

on:
  schedule:
    - cron: '10 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-month:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Replace month in README.md and index.html
        run: |
          MONTH=$(date -u +"%B %Y")
          echo "Setting month to: $MONTH"
          python3 - "$MONTH" <<'PY'
          import re, sys
          month = sys.argv[1]
          pattern = re.compile(r'(January|February|March|April|May|June|July|August|September|October|November|December) 20\d\d')
          for f in ['README.md', 'index.html']:
              try:
                  s = open(f, encoding='utf-8').read()
              except FileNotFoundError:
                  continue
              new = pattern.sub(month, s)
              if new != s:
                  open(f, 'w', encoding='utf-8').write(new)
                  print(f"Updated {f}")
          PY

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Auto-update month to $(date -u +'%B %Y')"
          git push
